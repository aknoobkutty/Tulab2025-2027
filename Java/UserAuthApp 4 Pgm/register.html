<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
        }

        form {
            background: white;
            width: 350px;
            margin: 80px auto;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            box-sizing: border-box;
        }

        .password-field {
            display: flex;
            align-items: center;
            width: 90%;
            margin: 10px auto;
        }

        .password-field input {
            flex: 1;
            margin: 0;
        }

        .toggle-password {
            margin-left: 10px;
            padding: 10px 12px;
            cursor: pointer;
            background: #e9ecef;
            border-radius: 5px;
            font-weight: 600;
            color: #333;
            user-select: none;
            white-space: nowrap;
        }

        button {
            padding: 10px 25px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>
<body>

<form action="RegisterServlet" method="post">
    <h2>User Registration</h2>

    <input type="text" name="name" placeholder="Enter Name" required>
    <input type="email" name="email" placeholder="Enter Email" required>
    <div class="password-field">
        <input id="registerPassword" type="password" name="password" placeholder="Enter Password" required>
        <span class="toggle-password" onclick="togglePassword('registerPassword', this)" title="Show/Hide Password">[View]</span>
    </div>
    <input type="text" name="city" placeholder="Enter City" required>

    <button type="submit">Register</button>

    <p>Already registered? <a href="login.html">Login here</a></p>
</form>

<script>
    function togglePassword(id, element) {
        const input = document.getElementById(id);
        if (input.type === 'password') {
            input.type = 'text';
            element.textContent = '[Hide]';
        } else {
            input.type = 'password';
            element.textContent = '[View]';
        }
    }
</script>

</body>
</html>
